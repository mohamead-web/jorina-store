services:
  postgres:
    image: postgres:16-alpine
    container_name: jorina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jorina
      POSTGRES_USER: jorina
      POSTGRES_PASSWORD: jorina
    ports:
      - "5433:5432"
    volumes:
      - jorina_postgres_data:/var/lib/postgresql/data

volumes:
  jorina_postgres_data:
